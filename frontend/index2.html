



<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Two-Way AI Communicator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;700&display=swap');
        body { font-family: 'Outfit', sans-serif; background: #0b0e11; color: white; text-align: center; padding: 20px; }
        .wrapper { max-width: 850px; margin: auto; }
        .panel { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; }
        #webcam { width: 100%; border-radius: 15px; transform: scaleX(-1); border: 2px solid #00f2fe; }
        #live-prediction { font-size: 3rem; font-weight: bold; color: #00f2fe; margin: 10px 0; height: 60px; text-shadow: 0 0 15px #00f2fe; }
        
        /* Chat Box & Bubbles */
        #chat-box { 
            background: rgba(0,0,0,0.4); height: 300px; overflow-y: auto; 
            padding: 20px; border-radius: 15px; text-align: left; 
            display: flex; flex-direction: column; gap: 12px; margin-top: 20px;
            border: 1px solid rgba(0,242,254,0.1); scroll-behavior: smooth;
        }
        .comment { 
            padding: 12px 20px; border-radius: 15px; 
            width: fit-content; animation: popIn 0.3s ease; font-weight: bold; font-size: 1.1rem;
        }
        /* Signer Bubbles (Blue) */
        .signer-msg { background: linear-gradient(135deg, #0072ff, #00c6ff); border-bottom-left-radius: 2px; align-self: flex-start; }
        /* Voice Bubbles (Green) */
        .voice-msg { background: linear-gradient(135deg, #27ae60, #2ecc71); border-bottom-right-radius: 2px; align-self: flex-end; }

        @keyframes popIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        
        .controls { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
        .btn { background: #0072ff; color: white; border: none; padding: 15px 30px; border-radius: 12px; cursor: pointer; font-size: 1rem; font-weight: bold; transition: 0.3s; }
        .btn-mic { background: #27ae60; }
        .btn-mic.active { background: #e74c3c; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(231, 76, 60, 0); } 100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); } }
        
        #status { color: #555; margin-bottom: 5px; }
        #mic-status { font-size: 0.9rem; color: #2ecc71; margin-top: 5px; display: none; }
    </style>
</head>
<body>

    <div class="wrapper" id="menu">
        <h1>💬 AI Two-Way Communicator</h1>
        <p style="color: #888;">Bridge the gap between Sign Language and Spoken Words</p>
        <button class="btn" onclick="startApp()">Enter Communication Room</button>
    </div>

    <div class="wrapper" id="app-interface" style="display:none;">
        <div id="status">Connecting...</div>
        <div id="live-prediction">...</div>
        
        <div class="panel">
            <video id="webcam" autoplay playsinline muted></video>
        </div>
        <canvas id="canvas" width="320" height="240" style="display:none;"></canvas>

        <div class="controls">
            <button id="mic-btn" class="btn btn-mic" onclick="toggleVoice()">🎙️ Start Voice Input</button>
            <button class="btn" style="background:#444;" onclick="location.reload()">Reset Session</button>
        </div>
        <div id="mic-status">Microphone is listening... Speak now!</div>

        <div id="chat-box"></div>
    </div>

    <script>
        let video = document.getElementById('webcam');
        let canvas = document.getElementById('canvas');
        let ctx = canvas.getContext('2d');
        let chatBox = document.getElementById('chat-box');
        let ws = null;
        
        let lastLoggedWord = "";
        let logCooldown = false;

        // --- SPEECH RECOGNITION SETUP ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        let isListening = false;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = true; // Keep listening
            recognition.interimResults = false; // Only final results
            recognition.lang = 'en-US';

            recognition.onresult = (event) => {
                const transcript = event.results[event.results.length - 1][0].transcript;
                addComment(transcript, 'voice');
            };

            recognition.onerror = (event) => {
                console.error("Speech Error:", event.error);
                stopVoice();
            };
        }

        function toggleVoice() {
            if (!isListening) startVoice();
            else stopVoice();
        }

        function startVoice() {
            if (!recognition) { alert("Speech not supported in this browser."); return; }
            recognition.start();
            isListening = true;
            document.getElementById('mic-btn').innerText = "🛑 Stop Voice Input";
            document.getElementById('mic-btn').classList.add('active');
            document.getElementById('mic-status').style.display = "block";
        }

        function stopVoice() {
            recognition.stop();
            isListening = false;
            document.getElementById('mic-btn').innerText = "🎙️ Start Voice Input";
            document.getElementById('mic-btn').classList.remove('active');
            document.getElementById('mic-status').style.display = "none";
        }

        // --- SIGN LANGUAGE (WEBSOCKET) LOGIC ---
        async function startApp() {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('app-interface').style.display = 'block';

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;

                ws = new WebSocket("ws://localhost:8000/ws/sign");

                ws.onopen = () => {
                    document.getElementById('status').innerText = "System Live";
                    captureAndSend();
                };

                ws.onmessage = (event) => {
                    let data = JSON.parse(event.data);
                    let word = data.prediction;

                    document.getElementById('live-prediction').innerText = word.toUpperCase();

                    if (word !== "..." && word !== lastLoggedWord && !logCooldown) {
                        addComment(word, 'signer');
                        speak(word); // Only speak sign language words
                        lastLoggedWord = word;
                        logCooldown = true;
                        setTimeout(() => { logCooldown = false; }, 1500);
                    }
                    requestAnimationFrame(captureAndSend);
                };
            } catch (err) {
                document.getElementById('status').innerText = "Camera Access Error!";
            }
        }

        function addComment(text, type) {
            let div = document.createElement('div');
            div.className = `comment ${type === 'signer' ? 'signer-msg' : 'voice-msg'}`;
            
            // Add an icon to distinguish
            const icon = type === 'signer' ? '🖐️ ' : '🎙️ ';
            div.innerText = icon + text.toUpperCase();
            
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function captureAndSend() {
            if (ws && ws.readyState === WebSocket.OPEN && video.readyState >= 2) {
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                ws.send(canvas.toDataURL('image/jpeg', 0.5));
            }
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            let msg = new SpeechSynthesisUtterance(text);
            msg.rate = 1.1;
            window.speechSynthesis.speak(msg);
        }
    </script>
</body>
</html>
